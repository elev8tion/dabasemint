<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="#05070d"/>
  <!-- Mint / data symbol -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="url(#grad)" stroke-width="80"/>
  <circle cx="512" cy="512" r="180" fill="url(#grad)"/>
  <!-- Stylized "D" or data bars -->
  <rect x="380" y="380" width="80" height="260" rx="20" fill="#05070d"/>
  <rect x="500" y="420" width="80" height="180" rx="20" fill="#05070d"/>
  <rect x="620" y="360" width="80" height="300" rx="20" fill="#05070d"/>
</svg>